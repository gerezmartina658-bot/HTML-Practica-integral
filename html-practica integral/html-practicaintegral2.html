<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>currículum</title>
</head>
<body>

    <main>
        <h2>Formulario de Carga - Currículum Vitae</h2>
        
        <form action="/guardarcv" method="POST">

            <div class="seccioncv">
                <h3>Datos Personales</h3>
                <div>
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="nombrecompleto" required>
                </div>
                <br>
                <div>
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="correo" required>
                </div>
                <br>
                <div>
                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="teldecontacto">
                </div>
                <br>
                  <div>
                    <label for="dni">dni:</label>
                    <input type="number" id="dni" name="dni">
                  </div>
                </div>

            <br><br> <div class="seccioncv">
                <h3>Información Académica</h3>
                <div>
                    <label for="titulo">Título :</label>
                    <input type="text" id="titulo" name="titulodeestudio">
                </div>
                <br>
                <div>
                    <label for="institucion">Institución:</label>
                    <input type="text" id="institucion" name="institucioneducativa">
                </div>
                <br>
                <div>
                    <label for="estado">Estado:</label>
                    <select id="estado" name="estadodeestudio">
                        <option value="encurso">En curso</option>
                        <option value="completo">Completo</option>
                        <option value="incompleto">Incompleto</option>
                    </select>
                </div>
            </div>

            <br><br>
    

            <div class="seccioncv">
                <h3>Experiencia Laboral</h3>
                <div>
                    <label for="puesto">Puesto:</label>
                    <input type="text" id="puesto" name="puestolaboral">
                </div>
                <br>
                <div>
                    <label for="empresa">empresa:</label>
                    <input type="text" id="empresa" name="empresa">
                </div>
                <br>
                <div>
                    <label for="tareas">Descripción de las  Tareas:</label>
                    <br>
                    <textarea id="tareas" name="descripcion_tareas"></textarea>
                </div>
            </div>

            <br><br>

            <div class="seccioncv">
                <h3>referente laboral:</h3>
                <div>
                    <label for="ref_nombre">Nombre del Referente:</label>
                    <input type="text" id="refnombre" name="nombrereferencia">
                </div>
                <br>
                <div>
                    <label for="ref_tel">Teléfono de Contacto:</label>
                    <input type="tel" id="reftel" name="telefonoreferencia">
                </div>
            </div>

            <br><br>

            <button type="submit">Guardar y Enviar CV</button>

        </form>
    </main>

</body>
</html>
